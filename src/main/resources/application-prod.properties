# Production
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# DB
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=1

# CORS
api.cors.allowed-origins=${ALLOWED_ORIGINS}

# Metrics
monitoring.user=${PROMETHEUS_USER}
monitoring.password=${PROMETHEUS_PASSWORD}

# Rate limiting
bucket4j.enabled=true
bucket4j.filters[0].url=.*
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=100
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=minutes
bucket4j.filters[0].hide-http-response-headers=false
bucket4j.filters[0].http-response-headers.RateLimit-Limit=100
bucket4j.filters[0].http-response-headers.RateLimit-Remaining=0
bucket4j.filters[0].http-status-code=too_many_requests
bucket4j.filters[0].http-content-type=application/json
bucket4j.filters[0].http-response-body={ "type": "about:blank", "title": "Too Many Requests", "status": 429, "detail": "You have exceeded the allowed request limit. Please try again later." }

# Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logs
logging.level.root=warn
logging.level.io.micrometer=warn
logging.level.com.giffing.bucket4j=warn
logging.level.org.springframework.cache=warn
logging.level.com.github.benmanes.caffeine=warn
logging.level.com.usuario.todolist.ToDoListApplication=info
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=error
logging.file.name=logs/todolist-api-prod.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.pattern.file={"time":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}", "level":"%level", "thread":"%t", "class":"%logger{36}", "message":"%msg"}%n
logging.pattern.console={"time":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}", "level":"%level", "thread":"%t", "class":"%logger{36}", "message":"%msg"}%n
