# PLANTILLA: al clonar, cambiar el nombre de este archivo a application-dev.properties
#  y colocar credenciales locales de PostgreSQL.

# Base de datos local
spring.datasource.url=jdbc:postgresql://localhost:5432/tasks_db
spring.datasource.username=NOMBRE_USUARIO
