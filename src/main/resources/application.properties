# General
spring.application.name=task-api

# Profile selection
spring.profiles.active=${APP_PROFILE:dev}

# CORS
api.cors.allowed-origins=${ALLOWED_ORIGINS}

# Metrics
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.limits.uri=100
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# OTLP
management.otlp.metrics.export.enabled=true
spring.application.group=tasks-system
management.otlp.metrics.export.aggregation-temporality=cumulative

# Rate limiting
spring.cache.type=jcache
spring.cache.jcache.provider=com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider

bucket4j.enabled=true
bucket4j.filters[0].cache-name=buckets
bucket4j.filters[0].url=.*
bucket4j.filters[0].strategy=first
bucket4j.filters[0].rate-limits[0].cache-key=getRemoteAddr()

# To avoid the warning that throws Spring by trying to prevent LazyInitializationException errors
spring.jpa.open-in-view=false