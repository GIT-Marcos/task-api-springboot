global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    monitor: 'local-network-monitor'

scrape_configs:
  - job_name: 'otel-collector'
    honor_labels: true
    static_configs:
      - targets: [ 'otel-collector:8889' ]

  - job_name: 'otel-collector-self'
    static_configs:
      - targets: [ 'otel-collector:8888' ]