global:
  scrape_interval: 5s
  scrape_timeout: 3s
  # Cada cuánto evalúa reglas de alertas
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'todolist-api-local'
    metrics_path: '/actuator/prometheus'
    basic_auth:
      username: 'admin'
      password: 'admin'
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]

  - job_name: 'prometheus-self-monitoring'
    static_configs:
      - targets: [ 'localhost:9090' ]